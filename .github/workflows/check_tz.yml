name: Check time zone

on:
  schedule:
    - cron: '18 2 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  weather_update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit Runner Timezone & Delay
        run: |
          echo "--- Timezone Audit ---"
          echo "Expected Trigger (UTC): 2:18"
          echo "Actual System Time (UTC): $(date -u +'%H:%M')"
          echo "Actual Malaysia Time (MYT): $(TZ='Asia/Kuala_Lumpur' date +'%H:%M')"
          echo "-----------------------"
