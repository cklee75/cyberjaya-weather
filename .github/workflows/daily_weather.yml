name: Daily Weather Push 🌦

on:
  schedule:
    # 12:00 UTC = 8:00 PM MYT (UTC+8) every day
    - cron: '0 12 * * *'

  # Allow manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  push-forecast:
    name: Fetch & Push Cyberjaya Forecast
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather push script
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weather_push.py
